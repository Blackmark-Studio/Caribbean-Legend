string = ItemsTrade_d1, "Inserir uma quantidade positiva pelo teclado define a compra do item, e uma negativa (com sinal de menos) define a venda.\nSetas esquerda/direita alteram a quantidade em uma unidade, e Shift + esquerda/direita para o máximo disponível. Pressionar Enter equivale a OK, e Esc a Cancelar."
