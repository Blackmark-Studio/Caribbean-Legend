string = ItemsDescribe1, "Aqui você pode obter informações sobre os itens disponíveis, explorar o inventário ou trocar o equipamento do personagem principal. Também é possível ver o inventário de oficiais, companheiros e passageiros. Eles escolhem suas próprias armas ao serem equipados com novos itens. A troca de itens com seus oficiais é feita em terra pelo comando 'Trocar'."
string = ItemsDescribe2, "Atenção!\nVocê pode descartar itens desnecessários do inventário\nOs itens serão descartados permanentemente!\nItens de missão e equipados não podem ser descartados"
string = ItemsDescribe3, "Pressione CTRL + LMB para descartar itens desnecessários"
string = ItemsFunc, "Resultado"
string = ItemSlot_1, "Lâmina"
string = ItemSlot_1_d, "Armas de lâmina longa para duelos de esgrima. Cada florete, sabre e cutelo é único. Os atributos dependem do desenvolvimento das habilidades e aptidões correspondentes.
Se um oficial não tiver uma lâmina equipada, ou tiver várias no inventário, ele escolherá a de maior dano levando em conta suas habilidades e aptidões."
string = ItemSlot_11, "Chapéu"
string = ItemSlot_11_d, "Chapéus afetam o estilo do seu herói e seu estilo de jogo. Você pode ocultar o chapéu equipado no modelo do personagem sem perder seus benefícios."
string = ItemSlot_11s_d, "Exibir chapéu"
string = ItemSlot_2, "Pistola"
string = ItemSlot_2_d, "Armas de fogo de cano curto usadas no cinto. Seus atributos dependem do desenvolvimento das habilidades e aptidões correspondentes. Se um oficial não tiver uma pistola equipada, ou tiver várias no inventário, escolherá a pistola com o maior número de cargas, se puder carregá-la; caso contrário, a de maior dano."
string = ItemSlot_3, "Luneta"
string = ItemSlot_3_d, "A luneta permite usar a função de navegação até navios e áreas marítimas, além de conhecer as características de navios, capitães e fortes. Quanto melhor a luneta, maior o alcance da navegação e mais completas as informações."
string = ItemSlot_4, "Coraça/Traje"
string = ItemSlot_4_d, "A armadura reduz o dano causado por qualquer tipo de arma. Armaduras médias e pesadas reduzem a velocidade de movimento, mas oferecem maior proteção."
string = ItemSlot_5, "Mosquete"
string = ItemSlot_5_d, "Armas de fogo de cano longo carregadas nas costas. A possibilidade de usar mosquetes, seu dano e velocidade de recarga dependem do desenvolvimento das habilidades e aptidões correspondentes. Oficiais só podem carregar um mosquete se disserem isso explicitamente. Se um oficial mosqueteiro não tiver um mosquete equipado, ou tiver vários no inventário, ele escolherá o mosquete com o maior número de cargas, se puder carregá-lo; caso contrário, o de maior dano."
string = ItemSlot_6, "Talismã"
string = ItemSlot_6_d, "Wards são amuletos protetores poderosos com duração ilimitada. Se um cargo for indicado para um amuleto, seu efeito funcionará no oficial correspondente."
string = ItemSlot_7, "Ferramenta"
string = ItemSlot_7_d, "Ferramentas concedem efeitos duradouros e abrem novas possibilidades. Instrumentos de navegação, livros, almanaques e diários — um capitão habilidoso sempre carrega algo importante consigo."
string = ItemSlot_8-10, "Amuleto"
string = ItemSlot_8-10_d, "Artefatos, que são muitos no Arquipélago, são equipados em espaços próprios."
string = ItemSlot_8-10!_d, "Importante! Amuletos se vinculam magicamente ao personagem ao serem equipados e são destruídos permanentemente se removidos. Planeje seus conjuntos com cuidado."
string = ItemSlot_Info_d1, "Para equipar um item, selecione-o na lista e pressione o botão 'Pegar'"
string = ItemSlot_Info_d2, "Clique duplo no ícone remove o item"
