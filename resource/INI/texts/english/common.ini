string = ItemsCount, "Items"
string = ItemsDescribe1, "Here you can get information about available items, explore the inventory or change the equipment of the main character. You can also view the inventory status of officers, companions and passengers. They choose weapons themselves when equipping them with new equipment. Exchange items with their officers carried out on land through the 'Exchange' command."
string = ItemsDescribe2, "Attention!\nYou can discard unnecessary items from your inventory\nItems are discarded permanently!\nQuest and equipped items cannot be discarded"
string = ItemsDescribe3, "Press CTRL + LMB to discard unnecessary items"
string = ItemsFunc, "Result"
string = ItemSlot_1, "Blade"
string = ItemSlot_1_d, "Long‑bladed weapons for fencing duels. Every rapier, saber, and cutlass is unique. Their stats depend on the development of the corresponding skills and perks.
If an officer has no blade equipped, or carries several in the inventory, he will choose the blade that deals the most damage, taking his skills and perks into account."
string = ItemSlot_11, "Hat"
string = ItemSlot_11_d, "Hats affect your hero's style and your playstyle. You can hide the equipped hat on the character model without losing its benefits."
string = ItemSlot_11s_d, "Display hat"
string = ItemSlot_2, "Pistol"
string = ItemSlot_2_d, "Short‑barreled firearms worn on the belt. Their stats depend on the development of the corresponding skills and perks. 
If an officer has no pistol equipped, or carries several in the inventory, he will choose the pistol with the highest number of charges if he can use it, otherwise the one that deals the most damage."
string = ItemSlot_3, "Spyglass"
string = ItemSlot_3_d, "A spyglass allows you to sail directly to ships and sea areas, and reveals the characteristics of ships, captains, and forts. The better the spyglass, the greater the sailing range and the more complete the information."
string = ItemSlot_4, "Cuirass/Costume"
string = ItemSlot_4_d, "Armor reduces damage from any type of weapon. Medium and heavy armor slow movement, but provide greater protection."
string = ItemSlot_5, "Musket"
string = ItemSlot_5_d, "Long‑barreled firearms carried on the back. The ability to carry muskets, their damage, and reload speed depend on the development of the corresponding skills and perks. Officers will only carry a musket if they explicitly state so.
If a musketeer officer has no musket equipped, or carries several in the inventory, he will choose the musket with the highest number of charges if he can use it, otherwise the one that deals the most damage."
string = ItemSlot_6, "Artefect"
string = ItemSlot_6_d, "Wards are powerful protective amulets with unlimited duration. If a position is specified for an amulet, its effect applies to the corresponding officer."
string = ItemSlot_7, "Tool"
string = ItemSlot_7_d, "Tools grant long‑lasting effects and unlock new possibilities. Navigational instruments, books, almanacs, and journals — a capable captain always keeps something useful at hand."
string = ItemSlot_8-10, "Amulet"
string = ItemSlot_8-10_d, "Artifacts, of which there are many in the Archipelago, are equipped in slots specially designated for them."
string = ItemSlot_8-10!_d, "Important! Amulets become magically bound to the character when equipped, and are irreversibly destroyed if removed. Plan your equipment sets wisely."
string = ItemSlot_Info_d1, "To equip an item, select it from the list and press the 'Take' button"
string = ItemSlot_Info_d2, "Double-click on the icon allows you to remove the item"
string = ItemsName, "Item"
string = ItemsNeed, "Need"
string = ItemsQty, "Qty"
string = itemStatsModifiersTitle, "With skills, Perks, and items"
string = ItemsTrade_d1, "Entering a positive quantity from the keyboard sets the purchase of the item, and a negative one (with a minus) sets the sale.\nLeft / right arrows change the quantity one at a time, and Shift + left / right to the maximum available. Pressing Enter on the form is tantamount to OK, and Esc - Cancel."
