string = Rules, "Rules"
string = RulesCards1, "The game of “21” uses a 36‑card deck. At the start, each player receives one card. Players draw in turn, trying not to exceed 21 points. Exactly 21 is an instant win; over 21 is a loss. A five‑card hand totaling under 21 also wins. If no one has exactly 21, the highest total (no more than 21) wins. Each new card raises the stake."
string = RulesCards2, "Card values:\nAce — 11 points\nKing — 4 points\nLord — 3 points\nNoble — 2 points\nOthers — face value"
string = RulesCards3, "Controls in the game:\nclick on the deck: draw a card (there must be money to bet), continue the game\nclick on the opponent's portrait: pass\n\n***"
string = RulesDice1, "Each player has five dice (1–6). Players take turns. On your turn you may select any dice to reroll — each selected die increases the stake. The highest combination wins; if tied, compare the highest values."
string = RulesDice2, "Combinations (ascending):\npair — two dice of the same value (e.g., 2‑2)\ntwo pair — two pairs of different values (e.g., 3‑3 and 6‑6)\nthree of a kind — three of the same (1‑1‑1)\nstraight — 1‑2‑3‑4‑5 or 2‑3‑4‑5‑6\nfull house — a pair and three of a kind (e.g., 1‑1 and 3‑3‑3)\nfour of a kind — four of the same (4‑4‑4‑4)\nfive of a kind — five of the same (5‑5‑5‑5‑5)"
string = RulesDice3, "Game controls:\nclick on glass: roll dice, continue game\nclick on dice: select dice to reroll (must have money to bet)\nclick on opponent's portrait: pass move (if no reroll is needed)"
