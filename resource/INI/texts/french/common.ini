string = ItemsCount, "Objet"
string = ItemsDescribe1, "Ici, vous pouvez obtenir des informations sur les objets disponibles, explorer l'inventaire ou changer l'équipement du personnage principal. Vous pouvez également consulter l'état de l'inventaire des officiers, des capitaines et des passagers. Ils choisissent eux-mêmes leurs armes lorsqu'ils reçoivent un nouvel équipement. L'échange d'objets avec les officiers s'effectue à terre grâce à la commande 'Échange'."
string = ItemsDescribe2, "Attention !\nVous pouvez vous débarrasser des objets inutiles de votre inventaire\nLes objets sont jetés de façon permanente !\n Les objets de quête et les objets équipés ne peuvent pas être abandonnés."
string = ItemsDescribe3, "Appuyez sur CTRL + LMB pour éliminer les éléments inutiles."
string = ItemsFunc, "Résultat"
string = ItemSlot_1, "Lame"
string = ItemSlot_1_d, "Armes à longue lame destinées aux duels d’escrime. Chaque rapière, sabre et coutelas est unique. Leurs caractéristiques dépendent du développement des compétences et aptitudes correspondantes.
Si un officier n’a pas de lame équipée, ou en possède plusieurs dans son inventaire, il choisira celle qui inflige le plus de dégâts en tenant compte de ses compétences et aptitudes."
string = ItemSlot_11, "Chapeau"
string = ItemSlot_11_d, "Les chapeaux influencent le style de votre héros et votre style de jeu. Vous pouvez masquer le chapeau équipé sur le modèle du personnage sans perdre ses avantages."
string = ItemSlot_11s_d, "Afficher le chapeau"
string = ItemSlot_2, "Pistolet"
string = ItemSlot_2_d, "Armes à feu à canon court portées à la ceinture. Leurs caractéristiques dépendent du développement des compétences et aptitudes correspondantes. Si un officier n’a pas de pistolet équipé, ou en possède plusieurs dans son inventaire, il choisira celui ayant le plus grand nombre de charges s’il peut le porter, sinon celui qui inflige le plus de dégâts."
string = ItemSlot_3, "Longue-vue"
string = ItemSlot_3_d, "Une longue-vue permet d’utiliser la fonction de navigation jusqu’aux navires et aux zones maritimes, ainsi que de connaître les caractéristiques des navires, des capitaines et des forts. Plus la longue-vue est de qualité, plus la portée de navigation et la précision des informations sont grandes."
string = ItemSlot_4, "Cuirasse / Costume"
string = ItemSlot_4_d, "L’armure réduit les dégâts infligés par tout type d’arme. Les armures moyennes et lourdes réduisent la vitesse de déplacement, mais offrent une meilleure protection."
string = ItemSlot_5, "Mousquet"
string = ItemSlot_5_d, "Armes à feu à long canon portées dans le dos. La possibilité de porter des mousquets, leurs dégâts et leur vitesse de rechargement dépendent du développement des compétences et aptitudes correspondantes. Les officiers ne peuvent porter un mousquet que s’ils le déclarent expressément. Si un officier mousquetaire n’a pas de mousquet équipé, ou en possède plusieurs dans son inventaire, il choisira celui ayant le plus grand nombre de charges s’il peut le porter, sinon celui qui inflige le plus de dégâts."
string = ItemSlot_6, "Talisman"
string = ItemSlot_6_d, "Les Wards sont de puissantes amulettes défensives à durée illimitée. Si une fonction est indiquée pour une amulette, son effet s’appliquera à l’officier correspondant."
string = ItemSlot_7, "Outil"
string = ItemSlot_7_d, "Les outils confèrent des effets durables et ouvrent de nouvelles possibilités. Instruments de navigation, livres, almanachs et journaux — un capitaine compétent emporte toujours quelque chose d’important avec lui."
string = ItemSlot_8-10, "Amulette"
string = ItemSlot_8-10_d, "Les artefacts, très nombreux dans l'archipel, sont placés dans des emplacements spécialement prévus à cet effet."
string = ItemSlot_8-10!_d, "Important ! Les amulettes se lient magiquement au personnage lorsqu'elles sont équipées, et sont détruites de façon irréversible si elles sont retirées. Planifiez vos ensembles d'équipement avec sagesse."
string = ItemSlot_Info_d1, "Pour équiper un objet, sélectionnez-le dans la liste et appuyez sur le bouton 'Prendre'."
string = ItemSlot_Info_d2, "Un double-clic sur l'icône permet de supprimer l'objet."
