string = Rules, "Règles"
string = RulesCards1, "Le « 21 » se joue avec un paquet de 36 cartes. Au début, chacun reçoit une carte. Les joueurs piochent à tour de rôle en veillant à ne pas dépasser 21. 21 tout rond : victoire immédiate ; au‑delà : défaite. Gagne aussi une main de cinq cartes totalisant moins de 21. Si personne n’a exactement 21, l’emporte le total le plus élevé (sans dépasser 21). Chaque nouvelle carte augmente la mise."
string = RulesCards2, "Valeur des cartes :\nAs — 11 points\nRoi — 4 points\nLord — 3 points\nNoble — 2 points\nAutres — valeur faciale"
string = RulesCards3, "Commandes de jeu :\ncliquez sur la pioche : tirez une carte (il doit y avoir de l'argent à miser), continuez le jeu\ncliquez sur le portrait de l'adversaire : passez\n\n***"
string = RulesDice1, "Chacun dispose de cinq dés (1–6). Les joueurs jouent à tour de rôle. À son tour, on peut choisir n’importe quels dés à relancer ; chaque dé choisi augmente la mise. La combinaison la plus haute l’emporte ; en cas d’égalité, on compare les valeurs les plus hautes."
string = RulesDice2, "Combinaisons par ordre croissant :\npaire — deux dés de même valeur (ex. 2‑2)\ndouble paire — deux paires de valeurs différentes (ex. 3‑3 et 6‑6)\nbrelan — trois identiques (1‑1‑1)\nquinte — 1‑2‑3‑4‑5 ou 2‑3‑4‑5‑6\nfull — une paire + un brelan (ex. 1‑1 et 3‑3‑3)\ncarré — quatre identiques (4‑4‑4‑4)\ncinq identiques — cinq identiques (5‑5‑5‑5‑5)"
string = RulesDice3, "Commandes de jeu :\ncliquez sur le verre : lancez les dés, continuez le jeu\ncliquez sur les dés : sélectionnez les dés à relancer (vous devez avoir de l'argent pour parier)\ncliquez sur le portrait de l'adversaire : passez votre tour (si vous n'avez pas besoin de relancer les dés)"
