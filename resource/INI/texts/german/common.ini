string = ItemsDescribe1, "Hier können Sie Informationen über verfügbare Gegenstände erhalten, das Inventar erkunden oder die Ausrüstung der Hauptfigur ändern. Sie können auch den Inventarstatus von Offizieren, Begleitern und Passagieren einsehen. Sie wählen selbst Waffen aus, wenn sie mit neuer Ausrüstung ausgestattet werden. Der Austausch von Gegenständen mit ihren Offizieren erfolgt an Land über den Befehl "Austausch"."
string = ItemsDescribe2, "Achtung!\nSie können nicht benötigte Gegenstände aus Ihrem Inventar wegwerfen!\nGegenstände werden permanent weggeworden!\nQuest- und Ausrüstungsgegenstände können nicht weggeworden werden"
string = ItemsDescribe3, "Drücken Sie Strg + LMB, um nicht benötigte Gegenstände wegzuwerfen."
string = ItemsFunc, "Ergebnis"
string = ItemSlot_1, "Schwert"
string = ItemSlot_1_d, "Langklingenwaffen für Fechtduelle. Jeder Degen, Säbel und Hauer ist einzigartig. Die Werte hängen von der Entwicklung der entsprechenden Fertigkeiten und Fähigkeiten ab.
Hat ein Offizier keine Klinge ausgerüstet oder mehrere im Inventar, wählt er unter Berücksichtigung seiner Fertigkeiten und Fähigkeiten die Klinge mit dem höchsten Schaden."
string = ItemSlot_11, "Hut"
string = ItemSlot_11_d, "Hüte beeinflussen den Stil deines Helden und deinen Spielstil. Du kannst den ausgerüsteten Hut auf dem Charaktermodell verbergen, ohne seine Vorteile zu verlieren."
string = ItemSlot_11s_d, "Hut anzeigen"
string = ItemSlot_2, "Pistole"
string = ItemSlot_2_d, "Kurze Schusswaffen, die am Gürtel getragen werden. Ihre Werte hängen von der Entwicklung der entsprechenden Fertigkeiten und Fähigkeiten ab. Hat ein Offizier keine Pistole ausgerüstet oder mehrere im Inventar, wählt er die Pistole mit den meisten Ladungen, sofern er sie tragen kann, andernfalls die mit dem höchsten Schaden."
string = ItemSlot_3, "Fernglas"
string = ItemSlot_3_d, "Ein Fernrohr ermöglicht die Funktion zum Hinsegeln zu Schiffen und Seegebieten sowie das Erkennen der Eigenschaften von Schiffen, Kapitänen und Forts. Je besser das Fernrohr, desto größer die Reichweite und desto vollständiger die Informationen."
string = ItemSlot_4, "Rüstung"
string = ItemSlot_4_d, "Rüstung verringert den von allen Waffenarten verursachten Schaden. Mittlere und schwere Rüstungen senken die Bewegungsgeschwindigkeit, bieten dafür aber besseren Schutz."
string = ItemSlot_5, "Muskete"
string = ItemSlot_5_d, "Langläufige Schusswaffen, die auf dem Rücken getragen werden. Ob Musketen getragen werden können, ihr Schaden und ihre Nachladegeschwindigkeit hängen von der Entwicklung der entsprechenden Fertigkeiten und Fähigkeiten ab. Offiziere können eine Muskete nur tragen, wenn sie dies ausdrücklich angeben. Hat ein Musketier-Offizier keine Muskete ausgerüstet oder mehrere im Inventar, wählt er die Muskete mit den meisten Ladungen, sofern er sie tragen kann, andernfalls die mit dem höchsten Schaden."
string = ItemSlot_6, "Talisman"
string = ItemSlot_6_d, "Wards sind mächtige Schutzamulette mit unbegrenzter Wirkungsdauer. Ist für ein Amulett ein Posten angegeben, wirkt sein Effekt auf den entsprechenden Offizier."
string = ItemSlot_7, "Werkzeug"
string = ItemSlot_7_d, "Werkzeuge gewähren lang anhaltende Effekte und eröffnen neue Möglichkeiten. Navigationsinstrumente, Bücher, Almanache und Journale — ein fähiger Kapitän trägt immer etwas Wichtiges bei sich."
string = ItemSlot_8-10, "Amulett"
string = ItemSlot_8-10_d, "Die Artefakte, von denen es im Archipel viele gibt, werden in eigens dafür vorgesehenen Fächern angebracht."
string = ItemSlot_8-10!_d, "Wichtig! Amulette werden beim Anlegen magisch an den Charakter gebunden und bei Abnahme unwiederbringlich zerstört. Plane deine Ausrüstungssets mit Bedacht."
string = ItemSlot_Info_d1, "Um einen Gegenstand auszurüsten, wähle ihn in der Liste aus und drücke die Taste 'Nehmen'."
string = ItemSlot_Info_d2, "Mit einem Doppelklick auf das Symbol können Sie das Element entfernen"
