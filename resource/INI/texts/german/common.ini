string = ItemsTrade_d1, "Die Eingabe einer positiven Menge über die Tastatur legt den Kauf des Artikels fest, und eine negative Menge (mit einem Minus) legt den Verkauf fest.\nDie Pfeile nach links/rechts ändern die Menge jeweils einzeln, und Shift + links/rechts auf das Maximum. Das Drücken der Eingabetaste auf dem Formular ist gleichbedeutend mit OK, und Esc - Abbrechen."
