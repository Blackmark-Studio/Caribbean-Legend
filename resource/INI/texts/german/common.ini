string = Rules, "Regeln"
string = RulesCards1, "„21“ wird mit einem 36‑Karten‑Deck gespielt. Zu Beginn erhält jeder eine Karte. Die Spieler ziehen reihum und versuchen, 21 nicht zu überschreiten. Genau 21 bedeutet sofortigen Sieg; über 21 ist eine Niederlage. Gewinnt auch eine Hand mit fünf Karten und einer Summe unter 21. Wenn niemand genau 21 hat, gewinnt die höchste Summe (maximal 21). Jede neue Karte erhöht den Einsatz."
string = RulesCards2, "Kartenwerte:\nAss — 11 Punkte\nKönig — 4 Punkte\nLord — 3 Punkte\nAdliger — 2 Punkte\nÜbrige — nach Nennwert"
string = RulesCards3, "Steuerung im Spiel:\nKlick auf den Stapel: eine Karte ziehen (es muss Geld zum Setzen vorhanden sein), das Spiel fortsetzen\nKlick auf das Porträt des Gegners: passen\n\n***"
string = RulesDice1, "Jeder erhält fünf Würfel (1–6). Es wird reihum gespielt. Im eigenen Zug können beliebige Würfel zum Neuwurf gewählt werden — jeder gewählte Würfel erhöht den Einsatz. Es gewinnt die höchste Kombination; bei Gleichstand entscheiden die höchsten Werte."
string = RulesDice2, "Kombinationen (aufsteigend):\nPaar — zwei gleiche (z. B. 2‑2)\nZwei Paare — Paare verschiedener Werte (z. B. 3‑3 und 6‑6)\nDrilling — drei gleiche (1‑1‑1)\nStraße — 1‑2‑3‑4‑5 oder 2‑3‑4‑5‑6\nFull House — Paar + Drilling (z. B. 1‑1 und 3‑3‑3)\nVierling — vier gleiche (4‑4‑4‑4)\nFünfling — fünf gleiche (5‑5‑5‑5‑5)"
string = RulesDice3, "Steuerung im Spiel:\Klick auf das Glas: würfeln, Spiel fortsetzen\Klick auf die Würfel: einen Würfel zum Würfeln auswählen (man muss Geld zum Setzen haben)\Klick auf das Porträt des Gegners: den Zug abgeben (wenn man nicht würfeln muss)."
