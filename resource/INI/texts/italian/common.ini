string = ItemsDescribe1, "Qui puoi ottenere informazioni sugli oggetti disponibili, esplorare l'inventario o modificare l'equipaggiamento del personaggio principale. Puoi anche visualizzare lo stato dell'inventario di ufficiali, accompagnatori e passeggeri. Scelgono loro stessi le armi quando le equipaggiano con nuove attrezzature. Scambia oggetti con i tuoi ufficiali effettuato a terra tramite il comando "Scambia"."
string = ItemsDescribe2, "Attenzione!\nPuoi scartare gli oggetti non necessari dal tuo inventario\nGli oggetti vengono scartati in modo permanente!\nLe missioni e gli oggetti equipaggiati non possono essere scartati"
string = ItemsDescribe3, "Premi CTRL + LMB per eliminare gli elementi non necessari"
string = ItemsFunc, "Risultato"
string = ItemSlot_1, "Spada"
string = ItemSlot_1_d, "Armi a lama lunga per duelli di scherma. Ogni rapier, sciabola e coltellaccio è unico. Le caratteristiche dipendono dallo sviluppo delle relative abilità e competenze.
Se un ufficiale non ha una lama equipaggiata, oppure ne ha più di una nell’inventario, sceglierà quella con il danno più alto tenendo conto delle sue abilità e competenze."
string = ItemSlot_11, "Cappello"
string = ItemSlot_11_d, "I cappelli influenzano lo stile del tuo eroe e il tuo stile di gioco. Puoi nascondere il cappello equipaggiato sul modello del personaggio senza perderne i benefici."
string = ItemSlot_11s_d, "Mostra cappello"
string = ItemSlot_2, "Pistola"
string = ItemSlot_2_d, "Armi da fuoco a canna corta portate alla cintura. Le loro caratteristiche dipendono dallo sviluppo delle relative abilità e competenze. Se un ufficiale non ha una pistola equipaggiata, oppure ne ha più di una nell’inventario, sceglierà la pistola con il maggior numero di cariche, se può portarla, altrimenti quella con il danno più alto."
string = ItemSlot_3, "Cannocchiale"
string = ItemSlot_3_d, "Un cannocchiale consente di usare la funzione di navigazione verso navi e aree di mare, oltre a conoscere le caratteristiche di navi, capitani e forti. Migliore è il cannocchiale, maggiore sarà la distanza di navigazione e più complete saranno le informazioni."
string = ItemSlot_4, "Corazza/Abito"
string = ItemSlot_4_d, "L’armatura riduce i danni inflitti da qualsiasi tipo di arma. Le armature medie e pesanti riducono la velocità di movimento, ma offrono maggiore protezione."
string = ItemSlot_5, "Moschetto"
string = ItemSlot_5_d, "Armi da fuoco a canna lunga portate sulla schiena. La possibilità di portare moschetti, il loro danno e la velocità di ricarica dipendono dallo sviluppo delle relative abilità e competenze. Gli ufficiali possono portare un moschetto solo se lo dichiarano esplicitamente. Se un ufficiale moschettiere non ha un moschetto equipaggiato, oppure ne ha più di uno nell’inventario, sceglierà quello con il maggior numero di cariche, se può portarlo, altrimenti quello con il danno più alto."
string = ItemSlot_6, "Talismano"
string = ItemSlot_6_d, "I Wards sono potenti amuleti protettivi con durata illimitata. Se per un amuleto è indicato un incarico, il suo effetto si applicherà all’ufficiale corrispondente."
string = ItemSlot_7, "Strumento"
string = ItemSlot_7_d, "Gli strumenti forniscono effetti duraturi e aprono nuove possibilità. Strumenti di navigazione, libri, almanacchi e giornali: un capitano esperto porta sempre con sé qualcosa di importante."
string = ItemSlot_8-10, "Amuleto"
string = ItemSlot_8-10_d, "Gli artefatti, che sono numerosi nell'Arcipelago, sono inseriti in slot appositamente designati per loro."
string = ItemSlot_8-10!_d, "Importante! Gli amuleti si legano magicamente al personaggio quando vengono equipaggiati e vengono distrutti in modo irreversibile se rimossi. Pianifica saggiamente i tuoi set di equipaggiamento."
string = ItemSlot_Info_d1, "Per equipaggiare un oggetto, selezionalo dall'elenco e premi il pulsante 'Prendi'."
string = ItemSlot_Info_d2, "Facendo doppio clic sull'icona è possibile rimuovere l'elemento"
