string = ItemsCount, "アイテム"
string = ItemsDescribe1, "ここでは所持品の情報を確認したり、 インベントリを調べたり、 主人公の装備を変更できます。 また、 士官や仲間、 乗客のインベントリ状況も確認可能です。 新しい装備を渡すと、 彼らは自分で武器を選びます。 士官とのアイテム交換は陸上で 「交換」 コマンドを使って行います。"
string = ItemsDescribe2, "注意！\n不要なアイテムはインベントリから捨てられます\n捨てたアイテムは元に戻せません！ \nクエストアイテムと装備中のアイテムは捨てられません"
string = ItemsDescribe3, "CTRL + 左クリックで不要なアイテムを捨てる"
string = ItemsFunc, "結果"
string = ItemSlot_1, "刃"
string = ItemSlot_1_d, "フェンシングの決闘用の長剣武器。レイピア、サーベル、カトラスはどれも固有品です。性能は対応する能力とスキルの成長に左右されます。
士官が刀剣を装備していない場合、またはインベントリに複数ある場合は、自身の能力とスキルを考慮して最もダメージの高い刀剣を選びます。"
string = ItemSlot_11, "帽子"
string = ItemSlot_11_d, "帽子はヒーローのスタイルとプレイスタイルに影響します。 装備した帽子をキャラクターモデル上で非表示にしても、 効果は失われません。"
string = ItemSlot_11s_d, "帽子を表示"
string = ItemSlot_2, "ピストル"
string = ItemSlot_2_d, "腰に携行する短銃身の火器。性能は対応する能力とスキルの成長に左右されます。士官がピストルを装備していない場合、またはインベントリに複数ある場合は、装備可能なら装填数が最も多いものを、そうでなければ最もダメージの高いものを選びます。"
string = ItemSlot_3, "望遠鏡"
string = ItemSlot_3_d, "望遠鏡を使うと、船や海域までの航行機能を利用でき、船・船長・要塞の情報も確認できます。望遠鏡の性能が高いほど、航行可能距離が伸び、得られる情報も詳細になります。"
string = ItemSlot_4, "胸甲／衣装"
string = ItemSlot_4_d, "防具はあらゆる武器によるダメージを軽減します。中装・重装の鎧は移動速度を下げますが、その分高い防御力を与えます。"
string = ItemSlot_5, "マスケット"
string = ItemSlot_5_d, "背中に背負う長銃身の火器。マスケットを装備できるかどうか、そのダメージとリロード速度は対応する能力とスキルの成長に左右されます。士官がマスケットを装備するのは、明示的にそう指示された場合に限られます。マスケット兵の士官がマスケットを装備していない場合、またはインベントリに複数ある場合は、装備可能なら装填数が最も多いものを、そうでなければ最もダメージの高いものを選びます。"
string = ItemSlot_6, "お守り"
string = ItemSlot_6_d, "Wardsは効果時間が無制限の強力な防護アミュレットです。アミュレットに役職が指定されている場合、その効果は対応する士官に適用されます。"
string = ItemSlot_7, "道具"
string = ItemSlot_7_d, "道具は長期的な効果を与え、新たな可能性を開きます。航海器具、本、暦、日誌――熟練の船長は常に何か重要なものを携えています。"
string = ItemSlot_8-10, "護符"
string = ItemSlot_8-10_d, "アルテファクトは、 群島に数多く存在し、 専用スロットに装備できます。"
string = ItemSlot_8-10!_d, "重要！ アミュレットは装備するとキャラクターに魔法的に結び付き、 外すと消滅します。 装備セットは慎重に選びましょう。"
string = ItemSlot_Info_d1, "アイテムを装備するには、 リストから選択して 「取る」 ボタンを押してください"
string = ItemSlot_Info_d2, "アイコンをダブルクリックするとアイテムを外せます"
