string = ItemsTrade_d1, "キーボードで正の数を入力すると購入、 負の数（ マイナス付き） を入力すると販売になります。 \n左右キーで数量を1ずつ変更、Shift＋左右キーで最大値まで変更できます。 フォームでEnterを押すとOK、Escでキャンセルとなります。"
