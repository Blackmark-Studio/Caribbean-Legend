string = ItemsCount, "Przedmioty"
string = ItemsDescribe1, "Tutaj możesz uzyskać informacje o dostępnych przedmiotach, zbadać ekwipunek lub zmienić wyposażenie głównego bohatera. Możesz również zobaczyć stan ekwipunku oficerów, towarzyszy i pasażerów. Sami wybierają broń, gdy są wyposażani w nowy ekwipunek. Wymiana przedmiotów z oficerami odbywa się na lądzie za pomocą komendy „Wymiana”."
string = ItemsDescribe2, "Uwaga!\nMożesz pozbywać się niepotrzebnych przedmiotów ze swojego ekwipunku\nWyrzucone przedmioty zostają stracone na zawszę!\nPrzedmiotów z zadań i obecnie założonych nie można wyrzucić"
string = ItemsDescribe3, "Przytrzymaj CTRL + LPM by wyrzucić niepotrzebne przedmioty"
string = ItemsFunc, "Określenie"
string = ItemSlot_1, "Ostrze"
string = ItemSlot_1_d, "Broń o długim ostrzu do pojedynków szermierczych. Każda rapier, szabla i tasak są unikatowe. Statystyki zależą od rozwoju odpowiednich umiejętności i zdolności.
Jeśli oficer nie ma założonego ostrza albo ma ich kilka w ekwipunku, wybierze ostrze o największych obrażeniach z uwzględnieniem swoich umiejętności i zdolności."
string = ItemSlot_11, "Kapelusz"
string = ItemSlot_11_d, "Kapelusze wpływają na styl twojego bohatera i twój styl gry. Możesz ukryć założony kapelusz na modelu postaci bez utraty jego korzyści."
string = ItemSlot_11s_d, "Wyświetl kapelusz"
string = ItemSlot_2, "Pistolet"
string = ItemSlot_2_d, "Krótkolufowa broń palna noszona przy pasie. Jej statystyki zależą od rozwoju odpowiednich umiejętności i zdolności. Jeśli oficer nie ma założonego pistoletu albo ma ich kilka w ekwipunku, wybierze pistolet z największą liczbą ładunków, jeśli może go nosić, w przeciwnym razie pistolet o najwyższych obrażeniach."
string = ItemSlot_3, "Luneta"
string = ItemSlot_3_d, "Luneta pozwala korzystać z funkcji dopłynięcia do statków i akwenów oraz poznawać cechy statków, kapitanów i fortów. Im lepsza luneta, tym większy zasięg dopłynięcia i pełniejsze informacje."
string = ItemSlot_4, "Kirys/Kostium"
string = ItemSlot_4_d, "Pancerz zmniejsza obrażenia zadawane przez każdy rodzaj broni. Średnie i ciężkie pancerze obniżają prędkość poruszania się, ale zapewniają większą ochronę."
string = ItemSlot_5, "Muszkiet"
string = ItemSlot_5_d, "Broń palna o długiej lufie noszona na plecach. Możliwość noszenia muszkietów, ich obrażenia i szybkość przeładowania zależą od rozwoju odpowiednich umiejętności i zdolności. Oficerowie mogą nosić muszkiet tylko wtedy, gdy powiedzą o tym wprost. Jeśli oficer-muszkieter nie ma założonego muszkietu albo ma ich kilka w ekwipunku, wybierze muszkiet z największą liczbą ładunków, jeśli może go nosić, w przeciwnym razie muszkiet o najwyższych obrażeniach."
string = ItemSlot_6, "Artefakt"
string = ItemSlot_6_d, "Wards to potężne ochronne amulety o nieograniczonym czasie działania. Jeśli dla amuletu wskazano stanowisko, jego efekt będzie działał na odpowiedniego oficera."
string = ItemSlot_7, "Narzędzie"
string = ItemSlot_7_d, "Narzędzia zapewniają długotrwałe efekty i otwierają nowe możliwości. Przyrządy nawigacyjne, książki, almanachy i dzienniki — zręczny kapitan zawsze nosi przy sobie coś ważnego."
string = ItemSlot_8-10, "Amulety"
string = ItemSlot_8-10_d, "Artefakty, których jest wiele na Archipelagu, są wyposażone w specjalnie przeznaczone dla nich gniazda."
string = ItemSlot_8-10!_d, "Ważne! Amulety zostają magicznie związane z postacią po ich założeniu i są bezpowrotnie niszczone po zdjęciu. Planuj zestawy z rozwagą."
string = ItemSlot_Info_d1, "Aby wyposażyć się w przedmiot, wybierz go z listy i naciśnij przycisk „Załóż”"
string = ItemSlot_Info_d2, "Dwukrotne kliknięcie na ikonę umożliwia usunięcie elementu"
string = ItemsName, "Przedmiot"
string = ItemsNeed, "Potrzeba"
