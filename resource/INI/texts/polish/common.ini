string = ItemsTrade_d1, "Wprowadzenie dodatniej liczby na klawiaturze oznacza zakup przedmiotu, a liczby ujemnej (z minusem) – jego sprzedaż. Strzałki w lewo / prawo zmieniają ilość o 1, a Shift + strzałki – do wartości maksymalnej.\nNaciśnięcie Enter zatwierdza, a Esc anuluje operację"
