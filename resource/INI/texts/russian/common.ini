string = NationRelation1, "Вы являетесь живым примером добродетелей для граждан этой страны. Матери ставят вас своим детям в пример, а юноши мечтают пойти по вашим стопам."
string = NationRelation2, "Девушки улыбаются вам вслед и томно вздыхают, в тратктире каждый старается пожать вам руку и вы являетесь желанным гостем в колониях этой страны."
string = NationRelation3, "Отношение к вам со стороны граждан этой страны абсолютно нейтрально. Вас могут пригласить составить компанию в карточной игре, но на большее не рассчитывайте."
string = NationRelation4, "Вас стараются не замечать. Никто не начнёт с вами диалог первым, а всякий, кто носит оружие, только и ждёт момента, когда вы позволите себе какую-нибудь глупость."
string = NationRelation5, "Граждане этой страны пугают вашим именем детей, старухи плюют вам вслед, а каждый уважающий себя мужчина, жаждет вырезать ваше сердце."
