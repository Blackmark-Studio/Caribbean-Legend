string = ItemsCount, "Предметов"
string = ItemsDescribe1, "Здесь Вы можете получить информацию об имеющихся предметах, изучить инвентарь или изменить экипировку главного героя. Также можно посмотреть состояние инвентаря офицеров, компаньонов и пассажиров. Выбор оружия они делают сами при экипировке их новым снаряжением. Обмен предметами со своими офицерами осуществляется на суше через команду 'Обмен'."
string = ItemsDescribe2, "Внимание!\nМожно выкидывать ненужные предметы из инвентаря\nПредметы выкидываются безвозвратно!\nКвестовые и надетые предметы нельзя выкинуть"
string = ItemsDescribe3, "Нажмите CTRL + ЛКМ, чтобы выкинуть ненужные предметы"
string = ItemsFunc, "Назначение"
string = ItemSlot_1, "Клинок"
string = ItemSlot_1_d, "Длинноклинковое оружие для фехтовальных поединков. Каждая рапира, сабля и тесак - уникальны. Характеристики зависят от развития соответствующих умений и навыков. 
Если у офицера не надет клинок, либо в инвентаре их несколько, он выберет клинок с наибольшим уроном с учетом его умений и навыков."
string = ItemSlot_11, "Шляпа"
string = ItemSlot_11_d, "Шляпы влияют на стиль героя и на ваш стиль игры. Надетую шляпу можно скрыть на модели персонажа без ущерба её полезности."
string = ItemSlot_11s_d, "Отображать шляпу"
string = ItemSlot_2, "Пистоль"
string = ItemSlot_2_d, "Короткоствольное огнестрельное оружие, носимое на поясе.  Характеристики зависят от развития соответствующих умений и навыков.  Если у офицеранет надетого пистоля, либо в инвентаре их несколько, офицер выберет пистоль с наибольшим количеством зарядов, если может их носить, либо пистоль с наибольшим уроном."
string = ItemSlot_3, "Подзорная труба"
string = ItemSlot_3_d, "Подзорная труба позволяет использовать функцию доплытия до кораблей и акваторий, а также узнавать характеристики кораблей, капитанов и фортов. Чем лучше труба, тем больше дальность доплытия и полнота информации."
string = ItemSlot_4, "Кираса/Костюм"
string = ItemSlot_4_d, "Броня снижает урон, нанесенный любым видом оружия. Средние и тяжелые доспехи снижают скорость передвижения, но предоставляют большую защиту."
string = ItemSlot_5, "Мушкет"
string = ItemSlot_5_d, "Длинноствольное огнестрельное оружие, носимое за спиной. Возможность носить мушкеты, их урон и скорость перезарядки зависят от развития соответствующих умений и навыков. Офицеры могут носить мушкет только если прямо об этом скажут. Если у офицера-мушкетера нет надетого мушкета, или в инвентаре их несколько, он выберет мушкет с наибольшим количеством зарядов, если может его носить, либо мушкет с наибольшим уроном."
string = ItemSlot_6, "Оберег"
string = ItemSlot_6_d, "Обереги - мощные защитные амулеты, которые имеют неограниченный срок действия. Если для амулета указана должность, то его эффект будет работать у соответствующего офицера."
string = ItemSlot_7, "Инструмент"
string = ItemSlot_7_d, "Инструменты предоставляют долговременные эффекты и открывают новые возможности. Навигационные приборы, книги, альманахи и журналы - умелый капитан всегда носит с собой что-то важное."
string = ItemSlot_8-10, "Амулет"
string = ItemSlot_8-10_d, "Артефакты, коих множество на Архипелаге, экипируются в специально отведенные для них слоты."
string = ItemSlot_8-10!_d, "Важно! Амулеты магически привязываются к персонажу при экипировке, и безвозвратно разрушаются, если их снять. Планируйте наборы с умом."
string = ItemSlot_Info_d1, "Для экипировки предмета нужно выбрать его в списке и нажать кнопку 'Взять'"
string = ItemSlot_Info_d2, "Двойной клик ЛКМ по иконке позволяет снять предмет"
string = ItemsName, "Предметы"
string = ItemsNeed, "Необходимо"
string = ItemsQty, "Кол-во"
string = itemStatsModifiersTitle, "С учётом умений, навыков и предметов"
string = ItemsTrade_d1, "Ввод положительного количества с клавиатуры устанавливает покупку предмета, а отрицательного (с минусом) продажу.\nСтрелки лево/право изменяют количество по одному, а Shift + лево/право на максимально доступное. Нажатие Enter на форме равносильно ОК, а Esc - Отмена."
