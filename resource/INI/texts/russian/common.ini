string = Rules, "Правила"
string = RulesCards1, "Игра «21» идёт колодой из 36 карт. В начале каждый получает по одной. Игроки берут карты по очереди, стараясь получить как можно больше очков, но не больше 21. Ровно 21 — мгновенная победа; больше 21 — проигрыш. Победа также засчитывается за пять карт с суммой меньше 21. Если 21 ни у кого нет, выигрывает наибольшая сумма. Каждая новая карта повышает ставку."
string = RulesCards2, "Стоимость карт:\nТуз — 11 очков\nКороль — 4 очка\nЛорд — 3 очка\nНобиль — 2 очка\nОстальные — по номиналу"
string = RulesCards3, "Управление в игре:\nклик по колоде: взять карту (должны иметься деньги на ставку), продолжить игру\nклик по портрету оппонента: передать ход\n\n***"
string = RulesDice1, "У каждого по пять костей. Кости имеют значения от 1 до 6. Игроки ходят по очереди. В свой ход можно отметить любые кости для переброса — за каждую отмеченную кость ставка растёт. Побеждает старшая комбинация; при равенстве сравниваются старшие значения."
string = RulesDice2, "Комбинации по возрастанию:\nодна пара — две кости одного значения (например, 2-2)\nдве пары — две пары разных значений (например, 3-3 и 6-6)\nтриада — три одинаковые (1-1-1)\nстрит — 1-2-3-4-5 или 2-3-4-5-6\nфулл — пара и триада (например, 1-1 и 3-3-3)\nкаре — четыре одинаковые (4-4-4-4)\nпокер — пять одинаковых (5-5-5-5-5)"
string = RulesDice3, "Управление в игре:\nклик по стакану: бросить кости, продолжить игру\nклик по кости: выбрать кость для перебрасывания (должны иметься деньги на ставку)\nклик по портрету оппонента: передать ход (если перебрасывание не нужно)"
