string = Rules, "Reglas"
string = RulesCards1, "El «21» se juega con una baraja de 36 cartas. Al inicio, cada jugador recibe una carta. Los jugadores roban por turnos intentando no superar 21. Con exactamente 21 se gana de inmediato; más de 21 es derrota. También gana una mano de cinco cartas con total inferior a 21. Si nadie logra exactamente 21, gana el total más alto (sin exceder 21). Cada carta nueva aumenta la apuesta."
string = RulesCards2, "Valor de las cartas:\nAs — 11 puntos\nRey — 4 puntos\nLord — 3 puntos\nNoble — 2 puntos\nResto — valor nominal"
string = RulesCards3, "Controles en el juego:\nhacer clic en la baraja: robar una carta (debe haber dinero para apostar), continuar el juego\nhacer clic en el retrato del adversario: pasar"
string = RulesDice1, "Cada jugador tiene cinco dados (1–6). Se juega por turnos. En tu turno puedes seleccionar cualquier dado para volver a tirar; cada dado seleccionado aumenta la apuesta. Gana la combinación más alta; en caso de empate se comparan los valores más altos."
string = RulesDice2, "Combinaciones de menor a mayor:\npareja — dos del mismo valor (p. ej., 2‑2)\ndoble pareja — dos parejas de valores distintos (p. ej., 3‑3 y 6‑6)\ntrío — tres iguales (1‑1‑1)\nescalera — 1‑2‑3‑4‑5 o 2‑3‑4‑5‑6\nfull — pareja + trío (p. ej., 1‑1 y 3‑3‑3)\npóker — cuatro iguales (4‑4‑4‑4)\nquintilla — cinco iguales (5‑5‑5‑5‑5)"
string = RulesDice3, "Controles del juego:\npulsar sobre el vaso: tirar dados, continuar la partida\nhaga clic en los dados: seleccione los dados que desea volver a lanzar (debe tener dinero para apostar)\nhacer clic en el retrato del adversario: pasar el movimiento (si no es necesario repetir la tirada)"
