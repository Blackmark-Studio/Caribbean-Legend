string = Mechanics_descr, "El Poder de la Flota depende de los tipos de barcos, su estado, rango y especialización. El nivel de amenaza depende de las relaciones con la nación, mientras que los piratas se vuelven más audaces con el tiempo. Si el Poder de la Flota supera el nivel de amenaza actual, la flota es temida y rara vez atacada."
