string = ItemsCount, "Objetos"
string = ItemsDescribe1, "Aquí puedes obtener información sobre los objetos disponibles, explorar el inventario o cambiar el equipo del personaje principal. También puedes ver el estado del inventario de oficiales, escoltas y pasajeros. Ellos mismos eligen las armas cuando se equipan con nuevo equipo. Intercambia objetos con tus oficiales en tierra mediante el comando 'Intercambiar'."
string = ItemsDescribe2, "Atención:\nPuedes descartar objetos innecesarios de tu inventario.\nLos objetos se descartan permanentemente.\nLos objetos de misión y equipados no se pueden descartar."
string = ItemsDescribe3, "Pulsa CTRL + LMB para descartar elementos innecesarios."
string = ItemsFunc, "Tipo"
string = ItemSlot_1, "Espada"
string = ItemSlot_1_d, "Armas de hoja larga para duelos de esgrima. Cada florete, sable y alfanje es único. Sus características dependen del desarrollo de las habilidades y aptitudes correspondientes.
Si un oficial no lleva una hoja equipada, o tiene varias en el inventario, elegirá la de mayor daño teniendo en cuenta sus habilidades y aptitudes."
string = ItemSlot_11, "Sombrero"
string = ItemSlot_11_d, "Los sombreros afectan el estilo de tu héroe y tu estilo de juego. Puedes ocultar el sombrero equipado en el modelo del personaje sin perder sus beneficios."
string = ItemSlot_11s_d, "Mostrar sombrero"
string = ItemSlot_2, "Pistola"
string = ItemSlot_2_d, "Armas de fuego de cañón corto que se llevan en el cinturón. Sus características dependen del desarrollo de las habilidades y aptitudes correspondientes. Si un oficial no lleva una pistola equipada, o tiene varias en el inventario, elegirá la pistola con mayor número de cargas si puede llevarla; en caso contrario, la de mayor daño."
string = ItemSlot_3, "Catalejo"
string = ItemSlot_3_d, "El catalejo permite usar la función de navegación hasta barcos y zonas marítimas, así como conocer las características de barcos, capitanes y fuertes. Cuanto mejor sea el catalejo, mayor será el alcance de navegación y más completa la información."
string = ItemSlot_4, "Coraza/Traje"
string = ItemSlot_4_d, "La armadura reduce el daño infligido por cualquier tipo de arma. Las armaduras medias y pesadas reducen la velocidad de movimiento, pero ofrecen mayor protección."
string = ItemSlot_5, "Mosquete"
string = ItemSlot_5_d, "Armas de fuego de cañón largo que se llevan a la espalda. La posibilidad de llevar mosquetes, su daño y velocidad de recarga dependen del desarrollo de las habilidades y aptitudes correspondientes. Los oficiales solo pueden llevar un mosquete si lo indican expresamente. Si un oficial mosquetero no lleva un mosquete equipado, o tiene varios en el inventario, elegirá el mosquete con mayor número de cargas si puede llevarlo; en caso contrario, el de mayor daño."
string = ItemSlot_6, "Talismán"
string = ItemSlot_6_d, "Los Wards son poderosos amuletos defensivos de duración ilimitada. Si para un amuleto se indica un puesto, su efecto funcionará sobre el oficial correspondiente."
string = ItemSlot_7, "Herramienta"
string = ItemSlot_7_d, "Las herramientas proporcionan efectos duraderos y abren nuevas posibilidades. Instrumentos de navegación, libros, almanaques y diarios: un capitán hábil siempre lleva consigo algo importante."
string = ItemSlot_8-10, "Amuleto"
string = ItemSlot_8-10_d, "Los artefactos, de los que hay muchos en el Archipiélago, se equipan en ranuras especialmente designadas para ellos."
string = ItemSlot_8-10!_d, "¡Importante! Los amuletos se enlazan mágicamente al personaje al equiparse y se destruyen de forma irreversible si se retiran. Planifica tus conjuntos de equipo con prudencia."
string = ItemSlot_Info_d1, "Para equipar un objeto, selecciónalo de la lista y pulsa el botón 'Equipar objeto' (también puedes darle doble clic)."
string = ItemSlot_Info_d2, "Hacer doble click sobre el icono permite desequipar el elemento"
string = ItemsName, "Objetos"
string = ItemsNeed, "Necesitas"
string = ItemsQty, "Ctd."
string = itemStatsModifiersTitle, "Teniendo en cuenta las habilidades, los Perks y los objetos"
string = ItemsTrade_d1, "Introduciendo una cantidad positiva desde el teclado se establece la compra del artículo, y una negativa (con un menos) la venta.\nFlechas izquierda / derecha cambian la cantidad de uno en uno, y Shift + izquierda / derecha hasta el máximo disponible. Pulsando Enter en el formulario equivale a OK, y Esc - Cancelar."
string = ItemsTrade_d2, "No hay objetos equipados por el personaje en la lista a la venta."
string = ItemsTradeInfo, "Sólo los objetos no equipados cuentan para el número de objetos del personaje."
