string = ItemsCount, "Eşyalar"
string = ItemsDescribe1, "Burada mevcut eşyalar hakkında bilgi alabilir, envanteri inceleyebilir veya ana karakterin ekipmanını değiştirebilirsiniz. Ayrıca subayların, yoldaşların ve yolcuların envanter durumunu görebilirsiniz. Onlara yeni ekipman verdiğinizde silah seçimlerini kendileri yapar. Subaylarla eşya takası karada 'Takas' komutuyla yapılır."
string = ItemsDescribe2, "Dikkat!\nEnvanterinizden gereksiz eşyaları atabilirsiniz\nEşyalar kalıcı olarak silinir!\nGörev ve donanımlı eşyalar atılamaz"
string = ItemsDescribe3, "Gereksiz eşyaları atmak için CTRL + LMB'ye basın"
string = ItemsFunc, "Sonuç"
string = ItemSlot_1, "Bıçak"
string = ItemSlot_1_d, "Eskrim düelloları için uzun namlulu kesici silahlar. Her rapier, pala ve satır benzersizdir. Özellikleri ilgili yetenek ve becerilerin gelişimine bağlıdır.
Bir subayın kuşanmış bir kılıcı yoksa ya da envanterinde birden fazlası varsa, beceri ve yeteneklerini dikkate alarak hasarı en yüksek olanı seçer."
string = ItemSlot_11, "Şapka"
string = ItemSlot_11_d, "Şapkalar kahramanınızın tarzını ve oyun tarzınızı etkiler. Kuşanılan şapkayı karakter modelinde gizleyebilir, faydalarını kaybetmezsiniz."
string = ItemSlot_11s_d, "Şapkayı göster"
string = ItemSlot_2, "Tabanca"
string = ItemSlot_2_d, "Kemerde taşınan kısa namlulu ateşli silahlar. Özellikleri ilgili yetenek ve becerilerin gelişimine bağlıdır. Bir subayın kuşanmış bir tabancası yoksa ya da envanterinde birkaç tane varsa, taşıyabiliyorsa önce en fazla yüke sahip olanı, aksi halde hasarı en yüksek olanı seçer."
string = ItemSlot_3, "Dürbün"
string = ItemSlot_3_d, "Dürbün, gemilere ve deniz bölgelerine kadar gitme işlevini kullanmanıza ve gemilerin, kaptanların ve kalelerin özelliklerini öğrenmenize olanak tanır. Dürbün ne kadar iyiyse, seyir menzili o kadar büyük ve bilgiler o kadar ayrıntılı olur."
string = ItemSlot_4, "Zırh/Kostüm"
string = ItemSlot_4_d, "Zırh, her tür silahın verdiği hasarı azaltır. Orta ve ağır zırh hareket hızını düşürür, ancak daha fazla koruma sağlar."
string = ItemSlot_5, "Misket Tüfeği"
string = ItemSlot_5_d, "Sırtta taşınan uzun namlulu ateşli silahlar. Tüfek taşıma imkanı, bunların hasarı ve doldurma hızı ilgili yetenek ve becerilerin gelişimine bağlıdır. Subaylar ancak bunu açıkça söylerlerse tüfek taşıyabilir. Bir tüfekçi subayın kuşanmış bir tüfeği yoksa ya da envanterinde birkaç tane varsa, taşıyabiliyorsa önce en fazla yüke sahip olanı, aksi halde hasarı en yüksek olanı seçer."
string = ItemSlot_6, "Tılsım"
string = ItemSlot_6_d, "Wards, süresiz etkiye sahip güçlü koruyucu amuletlerdir. Bir amulet için bir görev belirtilmişse, etkisi ilgili subay üzerinde çalışır."
string = ItemSlot_7, "Alet"
string = ItemSlot_7_d, "Aletler uzun süreli etkiler sağlar ve yeni olanaklar açar. Seyir aletleri, kitaplar, almanaklar ve günlükler — usta bir kaptan her zaman yanında önemli bir şey taşır."
string = ItemSlot_8-10, "Muska"
string = ItemSlot_8-10_d, "Takımadalar'da bolca bulunan eserler, onlar için ayrılmış özel yuvalara takılır."
string = ItemSlot_8-10!_d, "Önemli! Amuletler kuşanıldığında büyüyle karaktere bağlanır ve çıkarıldıklarında geri dönülmez şekilde yok olur. Ekipman setlerinizi dikkatle planlayın."
string = ItemSlot_Info_d1, "Bir eşyayı kuşanmak için listeden seçip 'Al' düğmesine basın"
string = ItemSlot_Info_d2, "Simgeye çift tıklayarak eşyayı çıkarabilirsin"
